name: Release Matrix

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  release:
    name: Build & Package Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb1-dev libxrandr-dev \
            libevdev-dev libxkbcommon-dev libwayland-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            libgtk-4-dev libadwaita-1-dev libgraphene-1.0-dev

      - name: Build release binaries
        run: |
          cargo build --release --workspace

      - name: Package Linux tarball
        run: |
          mkdir -p release-bundle/bin
          cp target/release/orbiscreen release-bundle/bin/
          cp scripts/install.sh release-bundle/
          tar -czvf orbiscreen-linux-x86_64.tar.gz -C release-bundle .

      - name: Set up JDK 17 for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android APK
        run: |
          cd clients/android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../../orbiscreen-android-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            orbiscreen-linux-x86_64.tar.gz
            orbiscreen-android-debug.apk
