name: Release Matrix

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Build & Package Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb1-dev libxrandr-dev \
            libevdev-dev libxkbcommon-dev libwayland-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            libgtk-4-dev libadwaita-1-dev libgraphene-1.0-dev

      - name: Build release binaries
        run: |
          cargo build --release --workspace

      - name: Package Linux tarball
        run: |
          mkdir -p release-bundle/bin
          cp target/release/orbiscreen release-bundle/bin/
          cp scripts/install.sh release-bundle/
          tar -czvf orbiscreen-linux-x86_64.tar.gz -C release-bundle .

      - name: Package Debian DEB package
        run: |
          chmod +x scripts/package-deb.sh
          ./scripts/package-deb.sh 0.5.0
          mv orbiscreen_0.5.0_amd64.deb orbiscreen_amd64.deb

      - name: Package RPM package
        run: |
          chmod +x scripts/package-rpm.sh
          ./scripts/package-rpm.sh 0.5.0
          cp target/rpm-staging/usr/bin/orbiscreen target/orbiscreen-binary || true
          tar -czvf orbiscreen-x86_64.rpm.tar.gz -C target/rpm-staging . || true

      - name: Package AppImage
        run: |
          chmod +x scripts/package-appimage.sh
          ./scripts/package-appimage.sh 0.5.0
          tar -czvf orbiscreen-x86_64.AppImage.tar.gz -C target/AppDir .

      - name: Set up JDK 17 for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android APKs
        run: |
          cd clients/android
          chmod +x gradlew
          ./gradlew assembleRelease assembleDebug
          cp app/build/outputs/apk/release/app-release.apk ../../orbiscreen-android-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk ../../orbiscreen-android-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            orbiscreen-linux-x86_64.tar.gz
            orbiscreen_amd64.deb
            orbiscreen-x86_64.AppImage.tar.gz
            orbiscreen-android-release.apk
            orbiscreen-android-debug.apk
