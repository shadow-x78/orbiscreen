<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Catppuccin Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="mainMonitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2b3d"/>
      <stop offset="100%" stop-color="#14141e"/>
    </linearGradient>
    <linearGradient id="secMonitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#363749"/>
      <stop offset="100%" stop-color="#1b1b28"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
    <linearGradient id="mauveGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89b4fa" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#cba6f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f5e0dc" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark Squircle Background for App Launcher -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" stroke="#313244" stroke-width="4"/>

  <!-- Main Monitor (Linux Host) -->
  <g id="primary-monitor">
    <path d="M125 385 L235 385 L225 345 L135 345 Z" fill="#45475a"/>
    <rect x="168" y="338" width="24" height="16" fill="#313244"/>
    <rect x="48" y="96" width="265" height="235" rx="16" ry="16" fill="url(#mainMonitorGrad)" stroke="#89b4fa" stroke-width="6"/>
    <rect x="62" y="110" width="237" height="182" rx="8" ry="8" fill="#11111b"/>
    <rect x="80" y="132" width="75" height="8" rx="4" fill="#89b4fa" opacity="0.85"/>
    <rect x="162" y="132" width="45" height="8" rx="4" fill="#cba6f7" opacity="0.65"/>
    <rect x="80" y="150" width="110" height="6" rx="3" fill="#45475a"/>
    <rect x="80" y="164" width="85" height="6" rx="3" fill="#45475a"/>
    <circle cx="205" cy="218" r="30" fill="none" stroke="url(#blueGlow)" stroke-width="4" opacity="0.45"/>
    <circle cx="205" cy="218" r="16" fill="none" stroke="#74c7ec" stroke-width="3" opacity="0.65"/>
  </g>

  <!-- Wireless Streaming Wave -->
  <g id="wireless-stream" filter="url(#glow)">
    <path d="M 265 188 Q 315 150 365 180" fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 6"/>
    <path d="M 280 218 Q 325 185 370 210" fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 295 248 Q 335 220 375 240" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4"/>
    <circle cx="315" cy="166" r="5" fill="#f5e0dc"/>
    <circle cx="340" cy="198" r="4" fill="#a6e3a1"/>
    <circle cx="325" cy="230" r="3.5" fill="#89b4fa"/>
  </g>

  <!-- Secondary Screen Device (Android / Tablet) -->
  <g id="secondary-device">
    <rect x="325" y="162" width="140" height="220" rx="20" ry="20" fill="url(#secMonitorGrad)" stroke="url(#mauveGlow)" stroke-width="6"/>
    <rect x="337" y="176" width="116" height="192" rx="12" ry="12" fill="#11111b"/>
    <rect x="349" y="192" width="92" height="142" rx="8" ry="8" fill="#1e1e2e" stroke="#cba6f7" stroke-width="2"/>
    <circle cx="395" cy="240" r="22" fill="none" stroke="#cba6f7" stroke-width="3"/>
    <path d="M 384 240 L 406 240 M 395 229 L 395 251" fill="none" stroke="#f5e0dc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="418" cy="272" r="6.5" fill="#a6e3a1" opacity="0.95"/>
    <circle cx="418" cy="272" r="13" fill="none" stroke="#a6e3a1" stroke-width="2" opacity="0.55"/>
    <rect x="375" y="352" width="40" height="4" rx="2" fill="#585b70"/>
  </g>
</svg>
