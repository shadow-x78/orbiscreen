<svg xmlns="http://www.w3.org/2000/svg" viewBox="24 54 464 396" width="512" height="437">
  <defs>
    <linearGradient id="bezelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111b"/>
      <stop offset="100%" stop-color="#0b0b10"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e0dc"/>
      <stop offset="100%" stop-color="#f2cdcd"/>
    </linearGradient>
  </defs>

  <!-- Outer Monitor Frame (Bezel) -->
  <rect x="32" y="64" width="448" height="320" rx="24" ry="24" fill="url(#bezelGrad)" stroke="url(#blueAccent)" stroke-width="14"/>

  <!-- Inner Display Screen -->
  <rect x="64" y="96" width="384" height="256" rx="12" ry="12" fill="url(#screenGrad)"/>

  <!-- Central Orbital Ring (Orbit Screen Motif) -->
  <circle cx="256" cy="224" r="68" fill="none" stroke="url(#blueAccent)" stroke-width="12" opacity="0.95"/>

  <!-- Top Arc Beam (Rosewater Glow) -->
  <path d="M 188 224 A 68 68 0 0 1 324 224" fill="none" stroke="url(#roseAccent)" stroke-width="12" stroke-linecap="round"/>

  <!-- Center Connection Dot -->
  <circle cx="256" cy="224" r="10" fill="#cba6f7"/>

  <!-- Monitor Stand Neck -->
  <rect x="216" y="384" width="80" height="36" fill="url(#blueAccent)" rx="4" ry="4"/>

  <!-- Monitor Stand Base -->
  <rect x="156" y="416" width="200" height="26" rx="10" ry="10" fill="#45475a" stroke="#585b70" stroke-width="2"/>
</svg>
